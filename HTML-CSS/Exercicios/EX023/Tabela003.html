<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesclagem</title>
    <style>
        body{font-family: Verdana, Geneva, Tahoma, sans-serif;}
       table{
        border-collapse: collapse;}
        th{border: 4px solid black;
            border-collapse: collapse;
        width: 100px;
        padding: 10px
        ;}
    </style>
</head>
<body>
    <h1>Mesclagem de Tabelas
    </h1>
    <table>
        <tr>
            <th colspan="2">A</th>
            <th>B</th>
        </tr>
        <tr>
            <th rowspan="2">D</th>
            <th>E</th>
            <th>F</th>
        </tr>
        <tr>
           
            <th>H</th>
            <th>I</th>
        </tr>
    </table>
</body>
</html>
