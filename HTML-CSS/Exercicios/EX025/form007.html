<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <h1>Formulario</h1>
    <form action="cadastro.php" method="post" autocomplete="on">
       
        <p>
        <label for="iestado">Estado</label>
        <select name="Estado" id="iestado">
            <option value="escolha">Selecione um estado</option>
            <optgroup label="Região Sudeste">
                <option value="SP">São Paulo</option>
                <option value="MG">Minas Gerais</option>
                <option value="RJ">Rio de Janeiro</option>
                <option value="ES">Espírito Santo</option>
            </optgroup>
            <optgroup label="Região Nordeste">
                <option value="AL">Alagoas</option>
                <option value="PE">Pernambuco</option>
            </optgroup>
        </select>
       </p>
       <p><label for="iprofissao">Profissão</label>
        <input type="text" name="profissao" id="iprofissao" list="tstprof">
        <datalist id="tstprof">
            <option value="Prog">programador</option>
            <option value="ana">analista</option>
            <option value="eng">engenheiro</option>
        </datalist>
    
    </p>
    <p>
        <label for="lstmg">Mensagem</label>
        <textarea name="mensagem" id="lstmg" cols="10" rows="5"></textarea>
    </p>
        <p>
            <input type="reset" value="Limpar">
            <input type="submit" value="Enviar">
        </p>
    </form>
</body>
</html>
