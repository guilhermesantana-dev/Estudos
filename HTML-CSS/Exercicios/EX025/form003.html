<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de formulário</title>
</head>
<body>
    <h1>Teste de formulário</h1>
    <form action="cadastro.php" method="get" autocomplete="">
        <p>
            <label for="inome">Nome:</label>
            <input type="text" name="nome" id="inome" required maxlength="30" placeholder="Nome Completo">
            <label for="inota">Nota:</label>
            <input type="number" name="numero" id="inumero" required min="0" max="10" step="0.1" placeholder="0 a 10">
            <label for="imes">Mês:</label>
            <input type="month" name="mes" id="imes" required>
            <label for="idata">Data:</label>
            <input type="date" name="data" id="idata" required>
            <label for="itempo">Tempo:</label>
            <input type="time" name="tempo" id="itempo">

        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
