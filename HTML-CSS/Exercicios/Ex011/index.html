<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem Dinâmica</h1>
    <p>Tente abrir a imagem em diferentes tamanhos de tela do navegador.</p>
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/imagem-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/imagem-m.png" type="image/png">
        <img src="imagens/imagem-g.png" alt="imagem flexivel" />
    </picture>

    <h1>Reprodução de Audio em html5</h1>
  
    <Audio preload="metadata" controls autoplay loop>
        <source src="audio/guanacast-33.mp3" type="audio/mp3">
        <source src="audio/guanacast-33.ogg" type="audio/ogg">
        <source src="audio/guanacast-33.wav" type="audio/wav">
        <p>Infelizmente seu navegador não consegue reproduzir este áudio.
            <a href="audio/guanacast-33.mp3">Baixe o arquivo</a>
        </p>
    </Audio>
</body>
</html>
