<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-Classes</title>
    <style>
        div{
            width: 200px;
            height: 200px;
            background-color:rgb(158, 157, 155) ;
            border: 1px solid black;
            display: inline-block;
            text-align: center;
        }
        div:hover{
            background-color: rgb(255, 0, 0);}
    </style>
</head>
<body>
    <div>d1</div>
    <div>d2</div>
    <div>d3</div>
</body>
</html>
