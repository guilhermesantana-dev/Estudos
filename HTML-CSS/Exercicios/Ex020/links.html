<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        a{color: blue;
        text-decoration: none;
    font-weight: bold;}
        a:visited{color: purple;}
        a:hover{color: black;
        text-decoration: underline;}
        a:active{color: yellow;}
        .especial{background-color: lightgray;}
        .especial::before{content: "→ ";}
        .especial::after{content: " ←";}
    </style>
</head>
<body>
<h1>Personalizando Links</h1>
  <ul>
    <li><a href="https://github.com/gustavoguanabara/html-css/tree/master">Repositório do GitHub</a></li>
    <li><a href="https://www.youtube.com/@cursoemvideo" class="especial">Canal do YouTube</a></li>
    <li><a href="https://www.cursoemvideo.com/">Site do Curso em Vídeo</a></li>
  </ul>  
</body>
</html>
